name: "🐛 Bug Report"
description: Report a bug in the app
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the relevant fields below.

  - type: textarea
    id: description
    attributes:
      label: "🐛 Description"
      description: Describe the bug briefly and precisely
      placeholder: "e.g. Auto-sync stopped working after app update"
    validations:
      required: true

  - type: dropdown
    id: android-version
    attributes:
      label: "📱 Android Version"
      options:
        - Android 16
        - Android 15
        - Android 14
        - Android 13
        - Android 12
        - Android 11
        - Android 10
        - Android 9
        - Android 8.x
        - Other
    validations:
      required: true

  - type: input
    id: app-version
    attributes:
      label: "📲 App Version"
      description: "Settings → About"
      placeholder: "e.g. v2.0.1"
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: "📱 Device"
      placeholder: "e.g. Samsung Galaxy S21, Google Pixel 7"
    validations:
      required: false

  - type: textarea
    id: steps
    attributes:
      label: "📋 Steps to Reproduce"
      placeholder: |
        1. Open the app
        2. Go to settings
        3. Click on ...
        4. Bug occurs
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: "✅ Expected Behavior"
      placeholder: "e.g. Notes should sync every 30 min"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: "❌ Actual Behavior"
      placeholder: "e.g. Sync doesn't work, no notification"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: "📋 Logs / Screenshots"
      description: |
        If available: screenshots or LogCat output.
        LogCat filter: `adb logcat -s SyncWorker NetworkMonitor WebDavSyncService`
      placeholder: "Paste logs or screenshots here"
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: "🔧 Additional Context"
      description: Anything else we should know? (server config, battery optimization, etc.)
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: "✅ Checklist"
      options:
        - label: I have read the [Troubleshooting section](https://github.com/inventory69/simple-notes-sync/blob/main/QUICKSTART.md#-troubleshooting)
          required: false
        - label: I have tried "Test connection" in settings
          required: false
